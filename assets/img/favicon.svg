<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34e0e8"/>
      <stop offset="0.55" stop-color="#ff3d9a"/>
      <stop offset="1" stop-color="#ffb648"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#0d0b16"/>
  <!-- antenna -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="url(#g)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="8" r="3.5" fill="#ffb648"/>
  <!-- head -->
  <rect x="14" y="18" width="36" height="30" rx="9" fill="none" stroke="url(#g)" stroke-width="3.5"/>
  <!-- eyes -->
  <circle cx="25" cy="33" r="4" fill="#34e0e8"/>
  <circle cx="39" cy="33" r="4" fill="#ff3d9a"/>
  <!-- mouth -->
  <line x1="24" y1="42" x2="40" y2="42" stroke="#ece8f2" stroke-width="2.5" stroke-linecap="round"/>
</svg>
